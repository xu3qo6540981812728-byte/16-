[build]
  # This tells Netlify where your functions are located.
  functions = "netlify/functions"
  # 從 Netlify 環境變數產生 firebase-web-config.js（與 Cursor 注入 __firebase_config 等效）
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# 本機 `npm run dev`（netlify dev）時明確指定靜態檔根目錄
[dev]
  publish = "."

# This rule makes your functions accessible through a cleaner URL.
# For example, requests to /api/quiz will be routed to /.netlify/functions/quiz
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
